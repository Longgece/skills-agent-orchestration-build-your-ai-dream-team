<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Pulse</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <h1>Project Pulse</h1>
      </div>
    </header>

    <main class="dashboard" id="dashboard" aria-live="polite">
      <!-- Project cards will be rendered here -->
    </main>

    <script>
      // Load and render projects from project-data.json
      async function loadProjects(){
        try{
          const res = await fetch('./project-data.json');
          if(!res.ok) throw new Error('Network response was not ok');
          const data = await res.json();
          const projects = Array.isArray(data.projects) ? data.projects : [];
          const root = document.getElementById('dashboard');
          root.innerHTML = '';
          projects.forEach(p => {
            const card = document.createElement('article');
            card.className = 'project-card';
            card.innerHTML = `\n              <div class="card-head">\n                <h2 class="project-name">${escapeHtml(p.name)}</h2>\n                <div class="meta">\n                  <span class="owner">${escapeHtml(p.owner)}</span>\n                  <span class="priority">Priority: ${escapeHtml(p.priority)}</span>\n                </div>\n              </div>\n              <p class="recent-activity">Recent: ${escapeHtml(p.recentActivity)}</p>\n              <div class="status">Status: <span class="status-badge">${escapeHtml(p.status)}</span></div>\n            `;
            root.appendChild(card);
          });

          if(projects.length === 0){
            root.innerHTML = '<div class="empty">No projects to show</div>';
          }
        }catch(err){
          console.error(err);
          const root = document.getElementById('dashboard');
          root.innerHTML = '<div class="error">Failed to load projects.</div>';
        }
      }

      function escapeHtml(str){
        return String(str || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      document.addEventListener('DOMContentLoaded', loadProjects);
    </script>
  </body>
</html>
